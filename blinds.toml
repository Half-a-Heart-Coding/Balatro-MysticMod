# Adds G.GAME.mechanics_mirrorDeckButNowMechanic
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "if G.GAME.blind.name == 'The Serpent' and"
position = "before"
payload = '''
if not G.GAME.mechanics_mirrorDeckButNowMechanic_saved_hands then
    G.GAME.mechanics_mirrorDeckButNowMechanic_saved_hands = 0
end
if G.GAME.mechanics_mirrorDeckButNowMechanic and (G.GAME.current_round.hands_played > G.GAME.mechanics_mirrorDeckButNowMechanic_saved_hands) then
	hand_space = hand_space - 1
    G.GAME.mechanics_mirrorDeckButNowMechanic_saved_hands = G.GAME.mechanics_mirrorDeckButNowMechanic_saved_hands + 1
end
'''
match_indent = true



# Calculated Chaos, Prevent hand from being played with less than 5 cards
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''
    if not self.deck_preview and not G.OVERLAY_MENU and (
     (self.deck and self.deck.cards[1] and self.deck.cards[1].states.collide.is and ((not self.deck.cards[1].states.drag.is) or self.CONTROLLER.HID.touch) and (not self.CONTROLLER.HID.controller)) or 
        G.CONTROLLER.held_buttons.triggerleft) then
'''
position = "at"
payload = '''
    if not self.deck_preview and not G.OVERLAY_MENU and (
     (self.deck and self.deck.cards[1] and self.deck.cards[1].states.collide.is and ((not self.deck.cards[1].states.drag.is) or self.CONTROLLER.HID.touch) and (not self.CONTROLLER.HID.controller)) or 
        G.CONTROLLER.held_buttons.triggerleft) and (not G.GAME.modifiers.prevent_deck_preview) then
'''
match_indent = true





